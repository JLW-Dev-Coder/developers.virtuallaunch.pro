<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Launch Pro — Operator</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Sora','sans-serif']}}}}</script>
  <style>
*{font-family:'Sora',sans-serif;box-sizing:border-box}
html,body{height:100%;margin:0;padding:0;overflow:hidden}
body{text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#334155}
.site-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
#app,#app>*{position:relative;z-index:1}
.bg-blob{position:absolute;border-radius:9999px;filter:blur(90px);will-change:transform}
.bb1{width:36rem;height:36rem;top:-10rem;left:-12rem;opacity:.18;background:radial-gradient(circle,rgba(16,185,129,.24) 0%,rgba(16,185,129,0) 70%);animation:bb1 32s cubic-bezier(.45,.05,.55,.95) infinite alternate}
.bb2{width:42rem;height:42rem;top:24rem;right:-14rem;opacity:.14;background:radial-gradient(circle,rgba(59,130,246,.16) 0%,rgba(59,130,246,0) 72%);animation:bb2 36s cubic-bezier(.45,.05,.55,.95) infinite alternate}
.bb3{width:30rem;height:30rem;bottom:-8rem;left:24%;opacity:.12;background:radial-gradient(circle,rgba(148,163,184,.14) 0%,rgba(148,163,184,0) 72%);animation:bb3 34s cubic-bezier(.45,.05,.55,.95) infinite alternate}
.bg-grid{position:absolute;inset:0;opacity:.07;background-image:linear-gradient(rgba(148,163,184,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,.08) 1px,transparent 1px);background-size:72px 72px}
@keyframes bb1{0%{transform:translate3d(0,0,0) scale(1);opacity:.14}50%{transform:translate3d(7rem,4rem,0) scale(1.08);opacity:.22}100%{transform:translate3d(9rem,5rem,0) scale(1.1);opacity:.2}}
@keyframes bb2{0%{transform:translate3d(0,0,0) scale(1);opacity:.11}50%{transform:translate3d(-7rem,-4rem,0) scale(1.07);opacity:.18}100%{transform:translate3d(-9rem,-3rem,0) scale(1.09);opacity:.16}}
@keyframes bb3{0%{transform:translate3d(0,0,0) scale(1);opacity:.1}100%{transform:translate3d(6rem,-6rem,0) scale(1.08);opacity:.15}}
.fade-in{animation:fi .3s ease both}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.nav-item{transition:all .15s ease;border-right:2px solid transparent}
.nav-item:hover{background:rgba(16,185,129,.06);color:#e2e8f0}
.nav-item.active{background:rgba(16,185,129,.1);border-right-color:#10b981;color:#f1f5f9}
.vlp-card{background:rgba(15,23,42,.5);border:1px solid rgba(51,65,85,.4);border-radius:12px;backdrop-filter:blur(8px);transition:border-color .2s,box-shadow .2s}
.vlp-card:hover{border-color:rgba(16,185,129,.18);box-shadow:0 0 24px rgba(16,185,129,.05)}
.badge{padding:2px 10px;border-radius:9999px;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.badge-pending{background:rgba(245,158,11,.1);color:#fcd34d;border:1px solid rgba(245,158,11,.18)}
.badge-active,.badge-approved{background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.18)}
.badge-open{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.18)}
.badge-closed,.badge-complete,.badge-archived{background:rgba(100,116,139,.1);color:#94a3b8;border:1px solid rgba(100,116,139,.18)}
.badge-denied{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.18)}
.badge-flagged,.badge-in_progress{background:rgba(245,158,11,.1);color:#fcd34d;border:1px solid rgba(245,158,11,.18)}
.btn-primary{background:linear-gradient(135deg,#10b981,#059669);color:#020617;padding:8px 18px;border-radius:8px;font-weight:600;font-size:.78rem;transition:all .15s;border:none;cursor:pointer}
.btn-primary:hover{background:linear-gradient(135deg,#34d399,#10b981);box-shadow:0 4px 16px rgba(16,185,129,.28)}
.btn-primary:disabled{background:#1e293b;color:#475569;cursor:not-allowed;box-shadow:none}
.btn-secondary{background:transparent;color:#64748b;padding:8px 18px;border-radius:8px;font-weight:600;font-size:.78rem;transition:all .15s;border:1px solid rgba(51,65,85,.6);cursor:pointer}
.btn-secondary:hover{border-color:rgba(16,185,129,.25);color:#e2e8f0;background:rgba(16,185,129,.04)}
.btn-secondary:disabled{opacity:.4;cursor:not-allowed}
.btn-danger{background:rgba(239,68,68,.1);color:#fca5a5;padding:8px 18px;border-radius:8px;font-weight:600;font-size:.78rem;transition:all .15s;border:1px solid rgba(239,68,68,.18);cursor:pointer}
.btn-danger:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.35)}
.btn-sm{padding:4px 12px;font-size:.7rem}
input,textarea,select{background:rgba(2,6,23,.6);border:1px solid rgba(51,65,85,.5);color:#e2e8f0;border-radius:8px;padding:10px 14px;font-size:.8rem;font-family:'Sora',sans-serif;transition:border-color .15s,box-shadow .15s;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:rgba(16,185,129,.6);box-shadow:0 0 0 3px rgba(16,185,129,.08)}
input::placeholder,textarea::placeholder{color:#334155}
select option{background:#0f172a;color:#e2e8f0}
.toggle-track{width:36px;height:20px;border-radius:10px;background:#0f172a;border:1px solid rgba(51,65,85,.5);position:relative;cursor:pointer;transition:all .2s;flex-shrink:0}
.toggle-track.on{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.35)}
.toggle-knob{width:14px;height:14px;border-radius:50%;background:#334155;position:absolute;top:2px;left:2px;transition:transform .2s,background .2s}
.toggle-track.on .toggle-knob{transform:translateX(16px);background:#10b981}
table{border-collapse:collapse;width:100%}
thead th{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:#475569;padding:12px 20px;text-align:left}
tbody tr{border-top:1px solid rgba(15,23,42,.8);transition:background .1s}
tbody tr:hover{background:rgba(16,185,129,.025)}
tbody td{padding:11px 20px;font-size:.8rem;color:#cbd5e1}
.msg-bubble{max-width:76%;padding:10px 14px;border-radius:12px;font-size:.8rem;line-height:1.55}
.msg-out{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.18);color:#d1fae5}
.msg-in{background:rgba(15,23,42,.7);border:1px solid rgba(51,65,85,.4);color:#e2e8f0}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:10px;font-size:.78rem;font-weight:600;z-index:9999;animation:fi .3s ease;pointer-events:none;backdrop-filter:blur(12px)}
.toast-success{background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.22)}
.toast-error{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.22)}
.toast-info{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.22)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.12);border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.gradient-text{background:linear-gradient(135deg,#10b981,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.skill-bar{height:3px;background:rgba(15,23,42,.8);border-radius:2px;overflow:hidden}
.skill-fill{height:100%;background:linear-gradient(90deg,#10b981,#059669);border-radius:2px;transition:width .5s ease}
.stat-pip{width:3px;border-radius:2px;flex-shrink:0}
.ps{overflow-y:auto;scrollbar-width:thin;scrollbar-color:#1e293b transparent}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 20px;color:#1e293b;text-align:center;gap:10px}
.divider{border-top:1px solid rgba(30,41,59,.6)}
  </style>
</head>
<body class="h-full bg-slate-950 text-slate-100 overflow-hidden">

<div class="site-bg" aria-hidden="true">
  <div class="bg-blob bb1"></div>
  <div class="bg-blob bb2"></div>
  <div class="bg-blob bb3"></div>
  <div class="bg-grid"></div>
</div>

<div id="app" class="h-full w-full flex">

  <!-- LOGIN -->
  <div id="login-screen" class="h-full w-full flex items-center justify-center">
    <div class="w-full fade-in" style="max-width:420px">
      <div class="text-center mb-12">
        <div class="inline-flex items-center gap-3 mb-6">
          <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20" style="background:linear-gradient(135deg,#10b981,#059669)">
            <i data-lucide="rocket" style="width:24px;height:24px;color:#020617"></i>
          </div>
          <span class="text-xl font-semibold tracking-tight">Virtual Launch Pro</span>
        </div>
        <h1 class="text-3xl font-semibold tracking-tight mb-2">Operator Dashboard</h1>
        <p class="text-base text-slate-500">Authenticated access only</p>
      </div>
      <div class="vlp-card p-8">
        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-[0.75rem] font-semibold text-slate-500 mb-2.5 uppercase tracking-widest">Operator Key</label>
            <input type="password" id="login-key" placeholder="Enter your operator key" required style="font-size:.95rem;padding:13px 16px">
          </div>
          <button type="submit" id="login-btn" class="btn-primary w-full" style="padding:14px;font-size:.9rem">Sign In</button>
        </form>
        <p id="login-error" class="hidden text-red-400 text-sm text-center mt-4">Invalid operator key. Please try again.</p>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="h-full w-full flex hidden">
    <!-- Sidebar -->
    <aside class="w-56 flex-shrink-0 h-full flex flex-col" style="background:rgba(2,6,23,.75);border-right:1px solid rgba(30,41,59,.5);backdrop-filter:blur(16px)">
      <div class="p-4 flex items-center gap-2.5 divider">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0" style="background:linear-gradient(135deg,#10b981,#059669)">
          <i data-lucide="rocket" style="width:13px;height:13px;color:#020617"></i>
        </div>
        <div>
          <div class="text-[0.72rem] font-semibold leading-tight">Virtual Launch Pro</div>
          <div class="text-[0.58rem] font-semibold uppercase tracking-widest" style="color:#10b981">Operator</div>
        </div>
      </div>
      <nav class="flex-1 px-2 py-3 space-y-0.5 ps" id="sidebar-nav"></nav>
      <div class="p-4 divider">
        <button id="logout-btn" class="flex items-center gap-2 text-[0.72rem] text-slate-600 hover:text-slate-300 transition-colors w-full">
          <i data-lucide="log-out" style="width:13px;height:13px"></i> Sign Out
        </button>
      </div>
    </aside>
    <!-- Main content -->
    <main class="flex-1 h-full overflow-y-auto ps" id="main-content"></main>
  </div>
</div>

<script>
const API='';let token=null,tokenExp=null;
function eid(){return'evt_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}
async function api(method,path,body,extra={}){
  const h={'Content-Type':'application/json',...extra};
  if(token)h['Authorization']='Bearer '+token;
  const o={method,headers:h};
  if(body&&method!=='GET')o.body=JSON.stringify(body);
  const r=await fetch(API+path,o);
  const d=await r.json().catch(()=>({ok:false,error:'parse_error'}));
  return{status:r.status,data:d};
}
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className='toast toast-'+type;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3500);
}
setInterval(()=>{
  if(tokenExp&&new Date()>=new Date(tokenExp)){
    token=null;tokenExp=null;
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
    toast('Session expired — please sign in again','error');
  }
},30000);

// NAV
const NAV=[
  {id:'analytics',icon:'bar-chart-3',label:'Overview'},
  {id:'submissions',icon:'inbox',label:'Submissions'},
  {id:'developers',icon:'users',label:'Developers'},
  {id:'jobs',icon:'briefcase',label:'Job Posts'},
  {id:'matches',icon:'git-merge',label:'Job Matches'},
  {id:'email',icon:'mail',label:'Bulk Email'},
  {id:'messages',icon:'message-circle',label:'Messages'},
  {id:'tickets',icon:'life-buoy',label:'Support Tickets'},
  {id:'canned',icon:'file-text',label:'Canned Responses'},
];
let view='analytics';
const nav=document.getElementById('sidebar-nav'),mc=document.getElementById('main-content');
function buildNav(){
  nav.innerHTML=NAV.map(n=>`<button class="nav-item w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-left text-[0.76rem] font-medium ${view===n.id?'active':'text-slate-500'}" data-v="${n.id}">
    <i data-lucide="${n.icon}" style="width:14px;height:14px;flex-shrink:0"></i><span>${n.label}</span>
  </button>`).join('');
  lucide.createIcons();
  nav.querySelectorAll('[data-v]').forEach(b=>b.addEventListener('click',()=>{view=b.dataset.v;buildNav();renderView()}));
}
function renderView(){
  ({analytics:rAnalytics,submissions:rSubmissions,developers:rDevs,jobs:rJobs,matches:rMatches,email:rEmail,messages:rMsgs,tickets:rTickets,canned:rCanned})[view]?.();
}
function hdr(t,s){return`<div class="mb-7"><h1 class="text-lg font-semibold tracking-tight">${t}</h1><p class="text-xs text-slate-600 mt-0.5">${s}</p></div>`}
function bdg(s){return`<span class="badge badge-${s||'pending'}">${s||'pending'}</span>`}
function spin(){return`<div class="flex items-center justify-center py-20"><div class="spinner" style="width:18px;height:18px;border-width:2px;color:#10b981"></div></div>`}
function empty(m){return`<div class="empty"><i data-lucide="inbox" style="width:26px;height:26px;color:#1e293b"></i><p class="text-sm text-slate-700">${m}</p></div>`}

// LOGIN
document.getElementById('login-form').addEventListener('submit',async e=>{
  e.preventDefault();
  const k=document.getElementById('login-key').value.trim();
  const btn=document.getElementById('login-btn'),err=document.getElementById('login-error');
  err.classList.add('hidden');btn.innerHTML='<span class="spinner"></span> Signing in…';btn.disabled=true;
  try{
    const{data}=await api('POST','/operator/auth',{eventId:eid()},{'x-operator-key':k});
    if(data.ok&&data.token){
      token=data.token;tokenExp=data.expiresAt;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      buildNav();renderView();
    }else err.classList.remove('hidden');
  }catch{err.classList.remove('hidden')}
  finally{btn.innerHTML='Sign In';btn.disabled=false}
});
document.getElementById('logout-btn').addEventListener('click',()=>{
  token=null;tokenExp=null;
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-key').value='';
});

// ANALYTICS
async function rAnalytics(){
  mc.innerHTML=`<div class="p-8 fade-in">${hdr('Overview','Platform metrics and submission activity')}${spin()}</div>`;lucide.createIcons();
  const{data}=await api('GET','/operator/analytics');
  if(!data.ok){toast('Failed to load analytics','error');return}
  const s=data.submissions||{};
  const pv=data.pageViews||{};
  // Handler returns pageViews.data.totals / .timeSeries / .topCountries / .topBrowsers / .firewallEvents / .statusCodes
  const pvAvail=pv.data!=null&&!pv.error;
  const pvd=pvAvail?pv.data:{};
  const tot=pvd.totals||{};
  const cfTS=pvd.timeSeries||[];
  const topCountries=pvd.topCountries||[];
  const topBrowsers=pvd.topBrowsers||[];
  const firewallEvents=pvd.firewallEvents||[];
  const statusCodes=pvd.statusCodes||[];

  function fmtBytes(b){if(!b)return'0 B';const u=['B','KB','MB','GB','TB'];let i=0;let v=b;while(v>=1024&&i<u.length-1){v/=1024;i++}return v.toFixed(i?1:0)+' '+u[i]}

  const cards=[{l:'Onboarding',v:s.onboarding??0,icon:'inbox',c:'#10b981'},{l:'Find Developers',v:s.findDevelopers??0,icon:'users',c:'#60a5fa'},{l:'Support',v:s.support??0,icon:'life-buoy',c:'#fbbf24'},{l:'Reviews',v:s.reviews??0,icon:'star',c:'#a78bfa'}];
  const ts=(data.timeSeries||[]).slice(-7);
  const mx=Math.max(...ts.map(t=>(t.onboarding||0)+(t.findDevelopers||0)+(t.support||0)+(t.reviews||0)),1);

  // CF stat cards — only show what the handler actually returned
  const cfStatDefs=[
    {k:'requests',        l:'Total Requests',    icon:'activity',   c:'#34d399'},
    {k:'uniqueVisitors',  l:'Unique Visitors',   icon:'user-check', c:'#a78bfa'},
    {k:'bytes',           l:'Bandwidth',         icon:'hard-drive', c:'#fbbf24', fmt:fmtBytes},
    {k:'cachedRequests',  l:'Cached Requests',   icon:'zap',        c:'#10b981'},
    {k:'cachedBytes',     l:'Cached Bandwidth',  icon:'database',   c:'#6ee7b7', fmt:fmtBytes},
    {k:'encryptedRequests',l:'Encrypted Req.',   icon:'lock',       c:'#f472b6'},
    {k:'threats',         l:'Threats Blocked',   icon:'shield',     c:'#f87171'},
  ];
  const cfStats=cfStatDefs.filter(d=>tot[d.k]!=null&&tot[d.k]!==0).map(d=>({...d,v:d.fmt?d.fmt(tot[d.k]):tot[d.k].toLocaleString()}));

  mc.innerHTML=`<div class="p-8 fade-in">
    ${hdr('Overview','Platform metrics and submission activity')}

    <!-- Submission stat cards -->
    <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600 mb-3">Form Submissions</div>
    <div class="grid grid-cols-4 gap-4 mb-7">
      ${cards.map(c=>`<div class="vlp-card p-5 flex gap-3">
        <div class="stat-pip" style="background:linear-gradient(180deg,${c.c},${c.c}55)"></div>
        <div class="flex-1 min-w-0">
          <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600 mb-2">${c.l}</div>
          <div class="text-2xl font-semibold">${c.v.toLocaleString()}</div>
        </div>
        <i data-lucide="${c.icon}" style="width:14px;height:14px;color:${c.c};opacity:.5;flex-shrink:0;margin-top:2px"></i>
      </div>`).join('')}
    </div>

    <!-- Cloudflare stat cards -->
    <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600 mb-3 flex items-center gap-2">
      Cloudflare Analytics
      ${pvAvail?`<span style="font-size:.58rem;padding:1px 7px;border-radius:9999px;background:rgba(16,185,129,.1);color:#6ee7b7;border:1px solid rgba(16,185,129,.18)">LIVE</span>`:`<span style="font-size:.58rem;padding:1px 7px;border-radius:9999px;background:rgba(100,116,139,.1);color:#94a3b8;border:1px solid rgba(100,116,139,.18)">${pv.error||'CF_API_TOKEN not configured'}</span>`}
    </div>
    ${pvAvail&&cfStats.length?`<div class="grid grid-cols-4 gap-4 mb-7">
      ${cfStats.map(c=>`<div class="vlp-card p-5 flex gap-3">
        <div class="stat-pip" style="background:linear-gradient(180deg,${c.c},${c.c}55)"></div>
        <div class="flex-1 min-w-0">
          <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600 mb-2">${c.l}</div>
          <div class="text-xl font-semibold">${c.v.toLocaleString()}</div>
        </div>
        <i data-lucide="${c.icon}" style="width:14px;height:14px;color:${c.c};opacity:.5;flex-shrink:0;margin-top:2px"></i>
      </div>`).join('')}
    </div>`:`<div class="vlp-card p-5 mb-7 flex items-center gap-3" style="border-color:rgba(100,116,139,.2)">
      <i data-lucide="info" style="width:14px;height:14px;color:#475569;flex-shrink:0"></i>
      <span class="text-[0.75rem] text-slate-600">Set <code style="font-size:.72rem;background:rgba(15,23,42,.6);padding:1px 6px;border-radius:4px;color:#94a3b8">CF_API_TOKEN</code> and <code style="font-size:.72rem;background:rgba(15,23,42,.6);padding:1px 6px;border-radius:4px;color:#94a3b8">CF_ZONE_ID</code> environment variables to enable Cloudflare page view analytics.</span>
    </div>`}

    <!-- Charts row -->
    <div class="grid grid-cols-2 gap-5 mb-5">
      <div class="vlp-card p-5">
        <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600 mb-5">Submission Volume</div>
        <div class="flex items-end gap-2 h-28">
          ${ts.length?ts.map(t=>{const v=(t.onboarding||0)+(t.findDevelopers||0)+(t.support||0)+(t.reviews||0);const p=Math.round((v/mx)*100);return`<div class="flex-1 flex flex-col items-center gap-1.5"><div class="w-full rounded-t" style="height:${Math.max(p,4)}%;background:linear-gradient(180deg,#10b981,#059669);opacity:${.35+(p/200)}"></div><span class="text-[0.55rem] text-slate-700">${(t.bucket||'').slice(5)||'—'}</span></div>`}).join(''):`<div class="w-full flex items-center justify-center text-xs text-slate-700">No data</div>`}
        </div>
      </div>
      <div class="vlp-card p-5">
        <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600 mb-3">Submission Breakdown</div>

          <div><label class="block text-[0.65rem] text-slate-600 mb-1.5">Cron Schedule</label><select id="ef-cr"><option value="">All</option><option value="3 days">3 days</option><option value="7 days">7 days</option><option value="14 days">14 days</option></select></div>
          <div><label class="block text-[0.65rem] text-slate-600 mb-1.5">Published</label><select id="ef-pb"><option value="">All</option><option value="true">Published</option><option value="false">Unpublished</option></select></div>
          <div><label class="block text-[0.65rem] text-slate-600 mb-1.5">Skill</label><input type="text" id="ef-sk" placeholder="e.g. skill_react"></div>
        </div>
        <button class="btn-secondary w-full mt-4 text-[0.72rem]" id="ef-dry">Preview Recipients</button>
        <div id="ef-dr" class="hidden mt-3 p-3 rounded-lg text-center" style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12)">
          <div id="ef-dc" class="text-2xl font-semibold gradient-text">—</div>
          <div class="text-[0.62rem] text-slate-600 mt-0.5">recipients match filters</div>
        </div>
      </div>
      <div class="col-span-2 vlp-card p-5">
        <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600 mb-4">Compose</div>
        <div class="space-y-3">
          <div><label class="block text-[0.65rem] text-slate-600 mb-1.5">Template</label><select id="ef-tpl"><option value="">None — write from scratch</option>${tpls.map(t=>`<option value="${t.templateId}">${t.label} (${t.userType})</option>`).join('')}</select></div>
          <div><label class="block text-[0.65rem] text-slate-600 mb-1.5">Subject *</label><input type="text" id="ef-sub" placeholder="Email subject…"></div>
          <div><label class="block text-[0.65rem] text-slate-600 mb-1.5">Body</label><textarea id="ef-body" rows="8" placeholder="Write your email here…"></textarea></div>
        </div>
        <div class="flex justify-end mt-4">
          <button class="btn-primary" id="ef-send"><span class="inline-flex items-center gap-1.5"><i data-lucide="send" style="width:13px;height:13px"></i> Send Email</span></button>
        </div>
      </div>
    </div>
  </div>`;lucide.createIcons();
  const gf=()=>{const f={};const st=document.getElementById('ef-st').value,cr=document.getElementById('ef-cr').value,pb=document.getElementById('ef-pb').value,sk=document.getElementById('ef-sk').value.trim();if(st)f.status=st;if(cr)f.cronSchedule=cr;if(pb!=='')f.publish=pb==='true';if(sk)f.skill=sk;return f};
  document.getElementById('ef-tpl').addEventListener('change',()=>{const t=tpls.find(t=>t.templateId===document.getElementById('ef-tpl').value);if(t){if(t.subject)document.getElementById('ef-sub').value=t.subject;if(t.body)document.getElementById('ef-body').value=t.body}});
  document.getElementById('ef-dry').addEventListener('click',async()=>{
    const btn=document.getElementById('ef-dry');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;
    const{data}=await api('POST','/operator/bulk-email',{eventId:eid(),subject:document.getElementById('ef-sub').value.trim()||'Preview',body:'dry run',filters:gf(),dryRun:true});
    btn.innerHTML='Preview Recipients';btn.disabled=false;
    document.getElementById('ef-dr').classList.remove('hidden');
    if(data.ok)document.getElementById('ef-dc').textContent=data.recipientCount??0;
    else{document.getElementById('ef-dc').textContent='—';toast('Preview failed','error')};
  });
  document.getElementById('ef-send').addEventListener('click',async()=>{
    const sub=document.getElementById('ef-sub').value.trim(),body=document.getElementById('ef-body').value.trim(),tid=document.getElementById('ef-tpl').value;
    if(!sub){toast('Subject required','error');return}if(!body&&!tid){toast('Body or template required','error');return}
    const btn=document.getElementById('ef-send');btn.innerHTML='<span class="spinner"></span> Sending…';btn.disabled=true;
    const p={eventId:eid(),subject:sub,filters:gf(),dryRun:false};if(body)p.body=body;if(tid)p.templateId=tid;
    const{data}=await api('POST','/operator/bulk-email',p);
    btn.innerHTML='<span class="inline-flex items-center gap-1.5"><i data-lucide="send" style="width:13px;height:13px"></i> Send Email</span>';btn.disabled=false;lucide.createIcons();
    if(data.ok)toast(`Sent to ${data.recipientCount} recipients`,'success');else toast('Send failed: '+(data.error||'unknown'),'error');
  });
}

// MESSAGES
let aRef=null;
async function rMsgs(){
  mc.innerHTML=`<div style="height:100%;display:flex" class="fade-in">
    <div style="width:280px;flex-shrink:0;border-right:1px solid rgba(30,41,59,.5);display:flex;flex-direction:column;height:100%">
      <div style="padding:16px;border-bottom:1px solid rgba(30,41,59,.5)">
        <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600 mb-3">Messages</div>
        <input type="text" id="mr-ref" placeholder="VLP- ref…" style="font-size:.74rem;padding:8px 10px">
        <button class="btn-primary w-full mt-2 btn-sm" id="mr-load">Load Thread</button>
      </div>
      <div id="mr-list" class="flex-1 ps"><div style="padding:16px;font-size:.72rem;color:#334155">Enter a VLP- ref to load a thread.</div></div>
    </div>
    <div id="mr-panel" style="flex:1;display:flex;flex-direction:column;height:100%">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:.82rem;color:#334155">Select a thread</div>
    </div>
  </div>`;lucide.createIcons();
  document.getElementById('mr-load').addEventListener('click',()=>{const r=document.getElementById('mr-ref').value.trim();if(!r){toast('Enter a VLP- ref','error');return}loadThread(r)});
  if(aRef)loadThread(aRef);
}
async function loadThread(ref){
  aRef=ref;document.getElementById('mr-ref').value=ref;
  document.getElementById('mr-panel').innerHTML=spin();
  const{data}=await api('GET',`/operator/messages?ref=${encodeURIComponent(ref)}`);
  if(!data.ok){toast('Failed to load messages','error');return}
  const msgs=data.messages||[];
  document.getElementById('mr-panel').innerHTML=`
    <div style="padding:14px 16px;border-bottom:1px solid rgba(30,41,59,.5);display:flex;align-items:center;gap:10px">
      <span style="font-size:.82rem;font-weight:600;color:#10b981">${ref}</span>
      <span style="font-size:.68rem;color:#334155">${msgs.length} message${msgs.length!==1?'s':''}</span>
    </div>
    <div class="ps" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px" id="mr-body">
      ${msgs.length?msgs.map(m=>`<div style="display:flex;justify-content:${m.direction==='outbound'?'flex-end':'flex-start'}">
        <div class="msg-bubble ${m.direction==='outbound'?'msg-out':'msg-in'}">
          <div style="font-size:.62rem;font-weight:600;margin-bottom:4px;color:${m.direction==='outbound'?'#10b981':'#475569'}">${m.subject||'(no subject)'}</div>
          <div>${m.body||''}</div>
          <div style="font-size:.58rem;margin-top:6px;color:${m.direction==='outbound'?'#065f46':'#334155'}">${m.sentAt?new Date(m.sentAt).toLocaleString():'—'}</div>
        </div>
      </div>`).join(''):`<div style="text-align:center;padding:40px 0;font-size:.8rem;color:#334155">No messages yet</div>`}
    </div>
    <div style="padding:14px 16px;border-top:1px solid rgba(30,41,59,.5);display:flex;flex-direction:column;gap:8px">
      <input type="text" id="mr-sub" placeholder="Subject…" style="font-size:.76rem;padding:8px 10px">
      <div style="display:flex;gap:8px">
        <textarea id="mr-body" rows="2" placeholder="Type a message…" style="font-size:.76rem;padding:8px 10px;resize:none;flex:1"></textarea>
        <button class="btn-primary" id="mr-send"><i data-lucide="send" style="width:14px;height:14px"></i></button>
      </div>
      <select id="mr-tpl" style="font-size:.72rem;padding:6px 8px"><option value="">Use canned response…</option></select>
    </div>`;
  lucide.createIcons();
  const{data:cd}=await api('GET','/operator/canned-responses');
  if(cd.ok){const s=document.getElementById('mr-tpl');(cd.templates||[]).forEach(t=>{const o=document.createElement('option');o.value=t.templateId;o.textContent=t.label;s.appendChild(o)});s.addEventListener('change',()=>{const t=(cd.templates||[]).find(t=>t.templateId===s.value);if(t){document.getElementById('mr-sub').value=t.subject||'';document.getElementById('mr-body').value=t.body||''}})}
  document.getElementById('mr-send').addEventListener('click',async()=>{
    const body=document.getElementById('mr-body').value.trim(),sub=document.getElementById('mr-sub').value.trim();
    if(!body){toast('Message body required','error');return}
    const btn=document.getElementById('mr-send');btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;
    const{data:sd}=await api('POST','/operator/messages',{eventId:eid(),ref_number:ref,subject:sub||'Message',body});
    btn.innerHTML='<i data-lucide="send" style="width:14px;height:14px"></i>';btn.disabled=false;lucide.createIcons();
    if(sd.ok){toast('Message sent','success');loadThread(ref)}else toast('Send failed: '+(sd.error||'unknown'),'error');
  });
}

// TICKETS
let aTk=null;
async function rTickets(){
  mc.innerHTML=`<div style="height:100%;display:flex" class="fade-in">
    <div style="width:280px;flex-shrink:0;border-right:1px solid rgba(30,41,59,.5);display:flex;flex-direction:column;height:100%">
      <div style="padding:14px 16px;border-bottom:1px solid rgba(30,41,59,.5)">
        <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600">Support Tickets</div>
      </div>
      <div id="tk-list" class="flex-1 ps">${spin()}</div>
    </div>
    <div id="tk-panel" style="flex:1;display:flex;flex-direction:column;height:100%">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:.82rem;color:#334155">Select a ticket</div>
    </div>
  </div>`;lucide.createIcons();
  await loadTkList();if(aTk)loadTk(aTk);
}
async function loadTkList(){
  const{data}=await api('GET','/operator/tickets');
  const list=document.getElementById('tk-list');
  if(!data.ok){list.innerHTML=`<div style="padding:16px;font-size:.72rem;color:#f87171">Failed to load tickets</div>`;return}
  const r=data.results||[];
  list.innerHTML=r.length?r.map(t=>`<button class="tk-btn w-full text-left" data-tkid="${t.ticketId}" style="padding:14px 16px;border-bottom:1px solid rgba(15,23,42,.8);background:${aTk===t.ticketId?'rgba(16,185,129,.04)':''};transition:background .1s" onmouseover="this.style.background='rgba(255,255,255,.02)'" onmouseout="this.style.background='${aTk===t.ticketId?'rgba(16,185,129,.04)':''}'">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span style="font-family:monospace;font-size:.65rem;color:#334155">${t.ticketId||'—'}</span>
      ${bdg(t.status)}
    </div>
    <div style="font-size:.78rem;font-weight:500;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.subject||'—'}</div>
    <div style="font-size:.68rem;color:#334155;margin-top:2px">${t.clientRef||'—'} · ${t.replyCount??0} replies</div>
  </button>`).join(''):`<div style="padding:16px;font-size:.72rem;color:#334155">No tickets found</div>`;
  lucide.createIcons();
  list.querySelectorAll('.tk-btn').forEach(b=>b.addEventListener('click',()=>{aTk=b.dataset.tkid;loadTk(aTk);loadTkList()}));
}
async function loadTk(id){
  document.getElementById('tk-panel').innerHTML=spin();lucide.createIcons();
  const{data}=await api('GET','/operator/tickets');
  const tk=(data.results||[]).find(t=>t.ticketId===id);
  if(!tk){document.getElementById('tk-panel').innerHTML=`<div style="padding:32px;font-size:.8rem;color:#334155">Ticket not found</div>`;return}
  document.getElementById('tk-panel').innerHTML=`
    <div style="padding:14px 16px;border-bottom:1px solid rgba(30,41,59,.5)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-family:monospace;font-size:.68rem;color:#334155">${tk.ticketId}</span>
        ${bdg(tk.status)}
        <span style="font-size:.68rem;color:#334155">${tk.clientRef||'—'}</span>
      </div>
      <div style="font-size:.85rem;font-weight:600;color:#e2e8f0">${tk.subject||'—'}</div>
    </div>
    <div class="ps" style="flex:1;overflow-y:auto;padding:20px">
      <div style="font-size:.68rem;color:#334155">Submitted ${tk.submittedAt?new Date(tk.submittedAt).toLocaleString():'—'} · ${tk.replyCount??0} existing replies</div>
    </div>
    <div style="padding:14px 16px;border-top:1px solid rgba(30,41,59,.5);display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;gap:8px">
        <textarea id="tk-rep" rows="2" placeholder="Type a reply…" style="font-size:.76rem;padding:8px 10px;resize:none;flex:1"></textarea>
        <button class="btn-primary" id="tk-send"><i data-lucide="send" style="width:14px;height:14px"></i></button>
      </div>
      <select id="tk-tpl" style="font-size:.72rem;padding:6px 8px"><option value="">Use canned response…</option></select>
    </div>`;
  lucide.createIcons();
  const{data:cd}=await api('GET','/operator/canned-responses');
  if(cd.ok){const s=document.getElementById('tk-tpl');(cd.templates||[]).forEach(t=>{const o=document.createElement('option');o.value=t.templateId;o.textContent=t.label;s.appendChild(o)});s.addEventListener('change',()=>{const t=(cd.templates||[]).find(t=>t.templateId===s.value);if(t)document.getElementById('tk-rep').value=t.body||''})}
  document.getElementById('tk-send').addEventListener('click',async()=>{
    const body=document.getElementById('tk-rep').value.trim();if(!body){toast('Reply required','error');return}
    const tid=document.getElementById('tk-tpl').value,btn=document.getElementById('tk-send');
    btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;
    const p={eventId:eid(),body};if(tid)p.templateId=tid;
    const{data:rd}=await api('POST',`/operator/tickets/${id}/reply`,p);
    btn.innerHTML='<i data-lucide="send" style="width:14px;height:14px"></i>';btn.disabled=false;lucide.createIcons();
    if(rd.ok){toast('Reply sent','success');loadTk(id);loadTkList()}else toast('Reply failed: '+(rd.error||'unknown'),'error');
  });
}

// CANNED RESPONSES
let ct='developer';
async function rCanned(){
  mc.innerHTML=`<div class="p-8 fade-in">${hdr('Canned Responses','Manage reusable message templates')}${spin()}</div>`;lucide.createIcons();
  const{data}=await api('GET',`/operator/canned-responses?userType=${ct}`);
  if(!data.ok){toast('Failed to load templates','error');return}
  const items=data.templates||[];
  mc.innerHTML=`<div class="p-8 fade-in">
    ${hdr('Canned Responses','Manage reusable message templates')}
    <div class="flex gap-2 mb-5 items-center flex-wrap">
      ${['developer','client','all'].map(t=>`<button class="btn-sm ${ct===t?'btn-primary':'btn-secondary'}" data-ct="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
      <div class="flex-1"></div>
      <button class="btn-primary" id="nt-tog"><span class="inline-flex items-center gap-1.5"><i data-lucide="plus" style="width:13px;height:13px"></i> New Template</span></button>
    </div>
    <div id="nt-form" class="hidden vlp-card p-5 mb-5">
      <div class="text-[0.62rem] font-semibold uppercase tracking-widest text-slate-600 mb-4">New Template</div>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div><label class="block text-[0.65rem] text-slate-600 mb-1.5">Label *</label><input type="text" id="nt-l" placeholder="e.g. Welcome Message"></div>
        <div><label class="block text-[0.65rem] text-slate-600 mb-1.5">User Type</label><select id="nt-u"><option value="developer">Developer</option><option value="client">Client</option></select></div>
        <div class="col-span-2"><label class="block text-[0.65rem] text-slate-600 mb-1.5">Subject</label><input type="text" id="nt-s" placeholder="Email subject…"></div>
        <div class="col-span-2"><label class="block text-[0.65rem] text-slate-600 mb-1.5">Body *</label><textarea id="nt-b" rows="4" placeholder="Template content…"></textarea></div>
      </div>
      <div class="flex gap-2"><button class="btn-primary btn-sm" id="nt-save">Save</button><button class="btn-secondary btn-sm" id="nt-cx">Cancel</button></div>
    </div>
    <div class="space-y-3">
      ${items.length?items.map(c=>`<div class="vlp-card p-5" id="cd-${c.templateId}">
        <div class="flex items-start justify-between mb-2">
          <div>
            <div class="font-semibold text-[0.82rem] text-slate-200">${c.label}</div>
            <div class="text-[0.65rem] text-slate-600 mt-0.5">${c.userType}${c.isDefault?' · <span style="color:#10b981">default</span>':''}</div>
          </div>
          <div class="flex gap-2">
            <button class="btn-sm btn-secondary ce-edit" data-id="${c.templateId}">Edit</button>
            ${c.isDefault?'':`<button class="btn-sm btn-danger ce-del" data-id="${c.templateId}">Delete</button>`}
          </div>
        </div>
        ${c.subject?`<div class="text-[0.68rem] text-slate-600 mb-2">${c.subject}</div>`:''}
        <p class="text-[0.8rem] text-slate-400 leading-relaxed">${c.body||''}</p>
        <div class="hidden mt-4 pt-4 divider" id="ce-${c.templateId}">
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div><label class="block text-[0.65rem] text-slate-600 mb-1">Label</label><input type="text" id="cel-${c.templateId}" value="${c.label}"></div>
            <div><label class="block text-[0.65rem] text-slate-600 mb-1">User Type</label><select id="ceu-${c.templateId}"><option value="developer" ${c.userType==='developer'?'selected':''}>Developer</option><option value="client" ${c.userType==='client'?'selected':''}>Client</option></select></div>
            <div class="col-span-2"><label class="block text-[0.65rem] text-slate-600 mb-1">Subject</label><input type="text" id="ces-${c.templateId}" value="${c.subject||''}"></div>
            <div class="col-span-2"><label class="block text-[0.65rem] text-slate-600 mb-1">Body</label><textarea id="ceb-${c.templateId}" rows="3">${c.body||''}</textarea></div>
          </div>
          <div class="flex gap-2"><button class="btn-sm btn-primary ce-save" data-id="${c.templateId}">Save</button><button class="btn-sm btn-secondary ce-cx" data-id="${c.templateId}">Cancel</button></div>
        </div>
      </div>`).join(''):empty('No templates yet')}
    </div>
  </div>`;lucide.createIcons();
  mc.querySelectorAll('[data-ct]').forEach(b=>b.addEventListener('click',()=>{ct=b.dataset.ct;rCanned()}));
  document.getElementById('nt-tog').addEventListener('click',()=>document.getElementById('nt-form').classList.toggle('hidden'));
  document.getElementById('nt-cx').addEventListener('click',()=>document.getElementById('nt-form').classList.add('hidden'));
  document.getElementById('nt-save').addEventListener('click',async()=>{
    const l=document.getElementById('nt-l').value.trim(),b=document.getElementById('nt-b').value.trim();
    if(!l||!b){toast('Label and body required','error');return}
    const{data}=await api('POST','/operator/canned-responses',{eventId:eid(),label:l,body:b,userType:document.getElementById('nt-u').value,subject:document.getElementById('nt-s').value.trim()});
    if(data.ok){toast('Template created','success');rCanned()}else toast('Create failed','error');
  });
  mc.querySelectorAll('.ce-edit').forEach(b=>b.addEventListener('click',()=>document.getElementById(`ce-${b.dataset.id}`).classList.toggle('hidden')));
  mc.querySelectorAll('.ce-cx').forEach(b=>b.addEventListener('click',()=>document.getElementById(`ce-${b.dataset.id}`).classList.add('hidden')));
  mc.querySelectorAll('.ce-save').forEach(b=>b.addEventListener('click',async()=>{
    const id=b.dataset.id;
    const{data}=await api('PATCH',`/operator/canned-responses/${id}`,{label:document.getElementById(`cel-${id}`).value.trim(),body:document.getElementById(`ceb-${id}`).value.trim(),userType:document.getElementById(`ceu-${id}`).value,subject:document.getElementById(`ces-${id}`).value.trim()});
    if(data.ok){toast('Template updated','success');rCanned()}else toast('Update failed','error');
  }));
  mc.querySelectorAll('.ce-del').forEach(b=>b.addEventListener('click',async()=>{
    if(!confirm('Delete this template?'))return;
    const{data}=await api('DELETE',`/operator/canned-responses/${b.dataset.id}`);
    if(data.ok){toast('Deleted','success');rCanned()}
    else if(data.error==='protected')toast('Cannot delete default templates','error');
    else toast('Delete failed','error');
  }));
}

lucide.createIcons();
</script>
</body>
</html>
