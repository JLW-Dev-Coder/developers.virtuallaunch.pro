name = "developers-virtuallaunch-pro-site"
compatibility_date = "2026-03-20"
pages_build_output_dir = ".vercel/output/static"

[[r2_buckets]]
binding = "ONBOARDING_R2"
bucket_name = "onboarding-records"
preview_bucket_name = "onboarding-records"

[[kv_namespaces]]
binding = "OPERATOR_SESSIONS"
id   = "7e094500597c41e2954fd4e6894a36cf"

[vars]
EMAIL_FROM = "team@virtuallaunch.pro"
CF_ZONE_ID = "dc402def9a745a2a65fc9b829b72c6f3"

# Secrets — set via: wrangler secret put <KEY>
# OPERATOR_KEY
# RESEND_API_KEY
# GOOGLE_PRIVATE_KEY
# GOOGLE_CLIENT_EMAIL
# CF_API_TOKEN         — Analytics:Read permission required
# CRON_SECRET          — used by POST /cron/job-match (x-cron-secret header)