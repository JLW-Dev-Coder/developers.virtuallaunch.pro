name = "vlp-onboarding-worker"
main = "workers/src/index.js"
compatibility_date = "2026-03-20"
type = "javascript"

[[r2_buckets]]
binding = "ONBOARDING_R2"
bucket_name = "onboarding-records"
preview_bucket_name = "onboarding-records"

# Stripe env vars — set actual secret values in Cloudflare dashboard, never here
# STRIPE_SECRET_KEY          — Stripe API secret key (live or test)
# STRIPE_WEBHOOK_SECRET      — Stripe webhook signing secret
# STRIPE_PRICE_FREE          — Free plan price ID (price_1TD7P79ROeyeXOqeuTnVu3oS)
# STRIPE_PRICE_PAID          — $2.99 recurring price ID (price_1TEtJw9ROeyeXOqeG9pEHCEt)
# STRIPE_INTERNAL_COUPON_ID  — Internal testing only — 100% off coupon
# Operator session store — create the KV namespace in the Cloudflare dashboard
# and paste the namespace ID below (leave empty until created)
[[kv_namespaces]]
name = "OPERATOR_SESSIONS"
id   = "7e094500597c41e2954fd4e6894a36cf"

[vars]
STRIPE_PRICE_FREE = "REPLACE_IN_DASHBOARD"
STRIPE_PRICE_PAID = "REPLACE_IN_DASHBOARD"
EMAIL_FROM        = "team@virtuallaunch.pro"
CF_ZONE_ID        = "" # Set to your Cloudflare zone ID (found in dashboard → Overview)

# RESEND_API_KEY       — set via: wrangler secret put RESEND_API_KEY
# GOOGLE_PRIVATE_KEY   — set via: wrangler secret put GOOGLE_PRIVATE_KEY
# GOOGLE_CLIENT_EMAIL  — set via: wrangler secret put GOOGLE_CLIENT_EMAIL
# CF_API_TOKEN         — set via: wrangler secret put CF_API_TOKEN
#                        Token needs Analytics:Read permission
